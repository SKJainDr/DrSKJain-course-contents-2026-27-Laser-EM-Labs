site_name: Advanced Electricity & Magnetism Learning Lab — User Guide
site_description: Theory, procedure, observation and result documentation for the Advanced Electricity & Magnetism Learning Lab virtual simulator
site_author: Dr. S. K. Jain
# Required so mkdocs-material emits correct absolute paths on generated
# pages that must work from any URL depth (currently just 404.html) -
# without this, those paths default to the domain root instead of this
# GitHub Pages *project* site's subpath, breaking the logo/CSS/JS/links
# on the 404 page specifically.
site_url: https://skjaindr.github.io/DrSKJain-course-contents-2026-27/docs-em/
copyright: >
  © 2026 Author. Prepared &amp; maintained by
  <strong>Dr. S. K. Jain</strong>, Associate Professor in Physics, Department of Applied Sciences and Humanities, Invertis University, Bareilly, India —
  <a href="mailto:sanjeev.j@invertis.org">sanjeev.j@invertis.org</a>
site_dir: ../docs-em

# The site links out to ../labs/advanced-electricity-magnetism-lab.html (the
# interactive simulator), which lives one level above docs_dir as a sibling
# folder in the repo, not inside this MkDocs project. Those are correct,
# intentional links, but MkDocs' own link-checker only knows about files
# under docs_dir, so it would otherwise flag them as broken even in a
# successful build. This keeps --strict useful for genuine internal errors
# while allowing that one known category of external, out-of-tree links.
validation:
  links:
    not_found: ignore
theme:
  name: material
  custom_dir: overrides
  logo: assets/icon.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light theme
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.highlight
extra_css:
  - stylesheets/extra.css
hooks:
  - hooks.py
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/three@0.128.0/build/three.min.js
  - https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js
  - javascripts/apparatus3d.js
  - javascripts/errorcalc.js
  - javascripts/graph-paste.js
nav:
  - Home: index.md
  - Formula Reference: formula-reference.md
  - Glossary: glossary.md
  - Electrostatics:
      - Coulomb's Law & Force Between Point Charges: experiments/coulombs-law.md
      - Electric Field & Potential Due to an Electric Dipole: experiments/dipole-field-potential.md
      - Gauss's Law — Electric Flux Through Closed Surfaces: experiments/gauss-law-flux.md
      - Capacitance of a Parallel-Plate Capacitor: experiments/parallel-plate-capacitor.md
      - Charge Distribution on Conductors & the Van de Graaff Generator: experiments/conductors-charge-distribution.md
  - Magnetostatics:
      - Biot–Savart Law: experiments/biot-savart-wire.md
      - Circular Coil & Helmholtz Coils: experiments/circular-coil-helmholtz.md
      - Ampere's Circuital Law — Solenoid & Toroid: experiments/ampere-law-solenoid-toroid.md
      - Force Between Parallel Conductors: experiments/force-parallel-conductors.md
  - Electrodynamics:
      - Faraday's Law of Electromagnetic Induction: experiments/faraday-induction.md
      - Motional EMF & Lenz's Law: experiments/motional-emf-lenz.md
      - RC and RL Transient Circuits: experiments/rc-rl-transients.md
      - LCR Series Resonance & Q-factor: experiments/lcr-resonance.md
  - EM Waves & Propagation:
      - Maxwell's Equations & Plane Waves: experiments/maxwell-plane-waves.md
      - Propagation in Dielectric & Conducting Media (Skin Depth): experiments/wave-propagation-media-skindepth.md
      - Reflection, Refraction & Brewster's Angle: experiments/reflection-refraction-brewster.md
  - Electric & Magnetic Materials:
      - Dielectric Polarization & Clausius–Mossotti Relation: experiments/dielectric-polarization-clausius-mossotti.md
      - Magnetic Hysteresis & the B–H Curve: experiments/magnetic-hysteresis-bh-curve.md
  - Safety: safety.md
  - Industrial Workshops:
      - 'WS1: EMI/EMC Compliance Testing': workshops/emi-emc-testing.md
      - 'WS2: Transformer Design & Testing': workshops/transformer-design-testing.md
      - 'WS3: Antenna Radiation Pattern & Gain': workshops/antenna-radiation-pattern.md
      - 'WS4: Eddy-Current Non-Destructive Testing': workshops/eddy-current-ndt.md
      - 'WS5: Magnetic Shielding Enclosure Design': workshops/magnetic-shielding-design.md
      - 'WS6: HV Insulation & Breakdown Testing': workshops/hv-insulation-breakdown.md
      - 'WS7: RF Impedance Matching & VSWR': workshops/rf-impedance-matching-vswr.md
